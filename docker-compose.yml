version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vinyl_collection
      POSTGRES_USER: vinyl_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinyl_user -d vinyl_collection"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://vinyl_user:${DB_PASSWORD}@postgres:5432/vinyl_collection
      DISCOGS_TOKEN: ${DISCOGS_TOKEN}
      API_KEY: ${API_KEY}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/vinyl-collection/api}
        REACT_APP_API_KEY: ${API_KEY}
        REACT_APP_VERSION: ${APP_VERSION:-1.2.0}
        REACT_APP_BUILD_DATE: ${BUILD_DATE:-April 2026}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
