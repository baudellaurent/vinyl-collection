<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer vinyl disc -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
  <!-- Grooves -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2a2a4e" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#2a2a4e" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#2a2a4e" stroke-width="1"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#2a2a4e" stroke-width="0.8"/>
  <!-- Label (center) -->
  <circle cx="32" cy="32" r="10" fill="#e94560"/>
  <!-- Center hole -->
  <circle cx="32" cy="32" r="3" fill="#1a1a2e"/>
  <!-- Highlight -->
  <circle cx="24" cy="20" r="4" fill="white" opacity="0.08"/>
